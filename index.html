<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Radio Button in HTML and CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="title">Choose Your Course</h1>

        <div class="courses">

            <input type="radio" name="course" id="html">


            <label for="html" class="courses-types">


                <div class="course-name">
                    <div class="wrapper">
                        <span class="circle"></span>
                    </div>
                    <h2>HTML & CSS</h2>
                </div>

                <p class="price">29$ / <span>year</span></p>

            </label>

            <!-- ============second course========== -->


            <input type="radio" name="course" id="js">

            <label for="js" class="courses-types">

                <div class="course-name">
                    <div class="wrapper">
                        <span class="circle"></span>
                    </div>
                    <h2>JavaScript</h2>
                </div>

                <p class="price">45$ / <span>year</span></p>

            </label>

            <!-- ==============third course============ -->

            <input type="radio" name="course" id="python">

            <label for="python" class="courses-types">

                <div class="course-name">
                    <div class="wrapper">
                        <span class="circle"></span>
                    </div>
                    <h2>PYTHON</h2>
                </div>

                <p class="price">70$ / <span>year</span></p>

            </label>
        </div>
    </div>

</body>

</html>
